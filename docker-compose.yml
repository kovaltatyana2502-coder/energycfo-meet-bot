services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "9"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: energycfo_bot
      POSTGRES_USER: energycfo_bot
      POSTGRES_PASSWORD: energycfo_bot_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energycfo_bot -d energycfo_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "9"

volumes:
  postgres_data:
